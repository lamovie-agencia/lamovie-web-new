    <style>
      html { scroll-behavior: smooth; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #050505; }
      ::-webkit-scrollbar-thumb { background: #333; }
      ::-webkit-scrollbar-thumb:hover { background: #B0232E; }
      body { background-color: #050505; color: white; cursor: default; }

      .film-grain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.05;
        background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
      }

      .reveal-on-scroll {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s cubic-bezier(0.5, 0, 0, 1);
      }
      .reveal-on-scroll.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .glass-nav {
        background: rgba(5, 5, 5, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      /* HERO GLITCH & TEXT EFFECTS */
      .hero-title-wrapper {
        position: relative;
        display: inline-block;
      }
      
      .hero-glitch {
        position: relative;
        color: white;
        mix-blend-mode: lighten;
      }
      
      .hero-glitch::before,
      .hero-glitch::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        width: 100%;
        height: 100%;
        opacity: 0.8;
      }

      .hero-glitch::before {
        left: 3px;
        color: #00ffff;
        z-index: -1;
        animation: glitch-anim-1 2s infinite linear alternate-reverse;
      }

      .hero-glitch::after {
        left: -3px;
        color: #ff00ff;
        z-index: -2;
        animation: glitch-anim-2 3s infinite linear alternate-reverse;
      }

      @keyframes glitch-anim-1 {
        0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
        20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
        40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
        60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
        80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); }
        100% { clip-path: inset(30% 0 20% 0); transform: translate(1px, -1px); }
      }

      @keyframes glitch-anim-2 {
        0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
        20% { clip-path: inset(80% 0 5% 0); transform: translate(-2px, 2px); }
        40% { clip-path: inset(30% 0 20% 0); transform: translate(2px, -2px); }
        60% { clip-path: inset(15% 0 80% 0); transform: translate(-1px, 1px); }
        80% { clip-path: inset(55% 0 10% 0); transform: translate(1px, -1px); }
        100% { clip-path: inset(40% 0 30% 0); transform: translate(-2px, 1px); }
      }

      .film-strip-bg {
        background-image: url("data:image/svg+xml,%3Csvg width='100' height='60' viewBox='0 0 100 60' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100' height='60' fill='black'/%3E%3Crect y='10' width='100' height='40' fill='%23111'/%3E%3Crect x='10' y='15' width='20' height='30' rx='2' fill='%23222'/%3E%3Crect x='40' y='15' width='20' height='30' rx='2' fill='%23222'/%3E%3Crect x='70' y='15' width='20' height='30' rx='2' fill='%23222'/%3E%3C/svg%3E");
        opacity: 0.1;
      }
      
      .clip-path-slant { clip-path: polygon(10% 0, 100% 0, 100% 100%, 0% 100%); }
      .clip-path-half { clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%); }

      .spotlight-card { position: relative; background: #171717; overflow: hidden; }
      .spotlight-card::before {
        content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(255, 255, 255, 0.06), transparent 40%);
        z-index: 1; opacity: 0; transition: opacity 0.5s; pointer-events: none;
      }
      .spotlight-card:hover::before { opacity: 1; }
      .spotlight-border {
        position: absolute; inset: 0; z-index: 2; pointer-events: none; border-radius: inherit;
        background: radial-gradient(400px circle at var(--mouse-x) var(--mouse-y), rgba(176, 35, 46, 0.4), transparent 40%);
        opacity: 0; transition: opacity 0.5s;
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor; mask-composite: exclude; padding: 1px; 
      }
      .spotlight-card:hover .spotlight-border { opacity: 1; }
    </style>

  <body class="antialiased overflow-x-hidden">
    <div class="film-grain"></div>
    <div id="root"></div>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
            }
          });
        }, { threshold: 0.1 });
        setTimeout(() => {
          document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
        }, 1000);
      });
    </script>
